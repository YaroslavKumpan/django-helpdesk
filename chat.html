<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Чат поддержки (с автообновлением токена и историей)</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; padding: 0 20px; }
        #messages { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        .message { margin-bottom: 10px; padding: 5px; border-radius: 5px; }
        .own { background-color: #e3f2fd; text-align: right; }
        .other { background-color: #f1f1f1; }
        .system { color: #666; font-style: italic; text-align: center; }
        #typingIndicator { height: 20px; font-style: italic; color: #666; margin-bottom: 5px; }
        input, button { padding: 8px; font-size: 16px; }
        #messageInput { width: 70%; }
        button { width: 25%; cursor: pointer; }
        #status { margin-bottom: 10px; font-weight: bold; }
        #tokenDebug { font-size: 12px; color: #999; margin-top: 10px; word-break: break-all; }
    </style>
</head>
<body>
    <h2>Чат поддержки (заявка #<span id="roomIdSpan">?</span>)</h2>
    <div id="status">🔴 Отключено</div>
    <div id="messages"></div>
    <div id="typingIndicator"></div>
    <input type="text" id="messageInput" placeholder="Введите сообщение..." disabled>
    <button id="sendBtn" disabled>Отправить</button>
    <!-- Для отладки (можно удалить) -->
    <div id="tokenDebug"></div>

    <script>
        // Элементы DOM
        const statusEl = document.getElementById('status');
        const messagesEl = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const roomIdSpan = document.getElementById('roomIdSpan');
        const typingIndicator = document.getElementById('typingIndicator');
        const tokenDebug = document.getElementById('tokenDebug');

        // ===== НАСТРОЙКИ =====
        const ROOM_ID = 18; // ID заявки
        // ВСТАВЬ СВОЙ РЕФРЕШ ТОКЕН (полученный при логине)
        let refreshToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ0b2tlbl90eXBlIjoicmVmcmVzaCIsImV4cCI6MTc3MzI0MTk4NywiaWF0IjoxNzczMTU1NTg3LCJqdGkiOiJkNGEzNzI2ZTY5MzY0ZjEyODU0ODE2MWZiNWNkYTgyYiIsInVzZXJfaWQiOiIyIn0.OYV1A0mvlr3RXwh_gYaDMt5QMxg11iEdL6p1255aI7A';
        let accessToken = null;
        let currentUserId = null; // будет получен из токена

        // Для WebSocket
        let socket = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECT_ATTEMPTS = 5;

        // Для индикатора печати
        let typingTimer;
        const TYPING_TIMEOUT = 1000;

        // Функция для декодирования JWT и получения payload
        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                return null;
            }
        }

        // Функция обновления access token через refresh
        async function refreshAccessToken() {
            if (!refreshToken) {
                console.error('Нет refresh токена');
                return null;
            }
            try {
                const response = await fetch('http://127.0.0.1:8000/api/token/refresh/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refresh: refreshToken })
                });
                if (!response.ok) {
                    throw new Error('Ошибка обновления токена');
                }
                const data = await response.json();
                accessToken = data.access;
                tokenDebug.innerHTML = `Токен обновлён: истекает ${new Date(parseJwt(accessToken).exp * 1000).toLocaleTimeString()}`;
                // Сохраняем id пользователя из токена
                currentUserId = parseJwt(accessToken).user_id;
                return accessToken;
            } catch (error) {
                console.error('Не удалось обновить токен:', error);
                addSystemMessage('⚠️ Ошибка аутентификации. Перезагрузите страницу.');
                return null;
            }
        }

        // Функция загрузки истории сообщений
        async function loadMessageHistory(requestId, token) {
            try {
                const response = await fetch(`http://127.0.0.1:8000/api/requests/${requestId}/messages/`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (!response.ok) {
                    throw new Error('Ошибка загрузки истории');
                }
                const messages = await response.json();
                // Сервер может отдавать последние сообщения первыми, поэтому разворачиваем
                messages.reverse().forEach(msg => {
                    // Определяем, своё ли сообщение (сравниваем id отправителя с currentUserId)
                    const isOwn = msg.sender.id === currentUserId;
                    addMessage(msg, isOwn);
                });
            } catch (error) {
                console.error('Не удалось загрузить историю:', error);
                addSystemMessage('⚠️ Не удалось загрузить историю сообщений');
            }
        }

        // Функция создания WebSocket с текущим accessToken
        function createWebSocket() {
            if (!accessToken) {
                console.error('Нет access токена');
                return;
            }
            if (socket) {
                socket.close();
            }
            const wsUrl = `ws://127.0.0.1:8000/ws/chat/${ROOM_ID}/?token=${accessToken}`;
            socket = new WebSocket(wsUrl);

            socket.onopen = () => {
                statusEl.textContent = '🟢 Подключено';
                messageInput.disabled = false;
                sendBtn.disabled = false;
                addSystemMessage('Соединение установлено');
                reconnectAttempts = 0;
            };

            socket.onclose = (e) => {
                statusEl.textContent = '🔴 Отключено';
                messageInput.disabled = true;
                sendBtn.disabled = true;
                if (reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
                    reconnectAttempts++;
                    addSystemMessage(`Попытка переподключения (${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS})...`);
                    setTimeout(async () => {
                        const newToken = await refreshAccessToken();
                        if (newToken) {
                            createWebSocket();
                        } else {
                            addSystemMessage('Не удалось обновить токен. Перезагрузите страницу.');
                        }
                    }, 2000 * reconnectAttempts);
                } else {
                    addSystemMessage('Не удалось восстановить соединение. Перезагрузите страницу.');
                }
            };

            socket.onerror = (e) => {
                console.error('WebSocket ошибка:', e);
            };

            socket.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'typing') {
                    if (data.status === 'start') {
                        typingIndicator.textContent = `${data.user} печатает...`;
                    } else {
                        typingIndicator.textContent = '';
                    }
                } else {
                    // Обычное сообщение от сервера (всегда чужое, так как свои мы не получаем)
                    addMessage(data, false);
                }
            };
        }

        // Функция добавления сообщения в окно чата
        function addMessage(data, isOwn = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + (isOwn ? 'own' : 'other');
            // data может быть от сервера (с полями message, user, timestamp) или от истории (с полями text, sender, created_at)
            // Унифицируем: если есть поле text, значит это из истории, иначе из WebSocket
            const messageText = data.text || data.message;
            const userName = data.sender ? data.sender.username : data.user;
            const timestamp = data.created_at || data.timestamp;
            msgDiv.innerHTML = `<strong>${userName}:</strong> ${messageText} <small style="float:right; color:#999;">${new Date(timestamp).toLocaleTimeString()}</small>`;
            messagesEl.appendChild(msgDiv);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function addSystemMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'system';
            msgDiv.textContent = text;
            messagesEl.appendChild(msgDiv);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function sendTyping(status) {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({type: 'typing', status: status}));
            }
        }

        // Инициализация: получаем access token, затем историю, затем WebSocket
        (async function init() {
            roomIdSpan.textContent = ROOM_ID;
            addSystemMessage('Получение токена...');
            const token = await refreshAccessToken();
            if (token) {
                // Загружаем историю
                await loadMessageHistory(ROOM_ID, token);
                // Создаём WebSocket
                createWebSocket();

                // Запускаем таймер для автоматического обновления токена
                const payload = parseJwt(token);
                if (payload && payload.exp) {
                    const expiresIn = payload.exp * 1000 - Date.now();
                    const refreshTime = expiresIn - 60000; // за 1 минуту до истечения
                    if (refreshTime > 0) {
                        setTimeout(async () => {
                            console.log('Обновляем токен по таймеру');
                            const newToken = await refreshAccessToken();
                            if (newToken) {
                                createWebSocket(); // переподключаем с новым токеном
                            }
                        }, refreshTime);
                    }
                }
            } else {
                addSystemMessage('Ошибка инициализации. Проверьте refresh token.');
            }
        })();

        // Отслеживание ввода для индикатора "печатает"
        messageInput.addEventListener('input', () => {
            if (typingTimer) clearTimeout(typingTimer);

            if (!typingTimer) {
                sendTyping('start');
            }

            typingTimer = setTimeout(() => {
                sendTyping('stop');
                typingTimer = null;
            }, TYPING_TIMEOUT);
        });

        // Отправка сообщения по кнопке
        sendBtn.addEventListener('click', () => {
            if (typingTimer) {
                clearTimeout(typingTimer);
                typingTimer = null;
                sendTyping('stop');
            }

            const text = messageInput.value.trim();
            if (text && socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({message: text}));
                // Сразу добавляем своё сообщение в чат (чтобы не ждать эха)
                addMessage({user: 'Я', message: text, timestamp: new Date().toISOString()}, true);
                messageInput.value = '';
            }
        });

        // Отправка по Enter
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendBtn.click();
            }
        });
    </script>
</body>
</html>
