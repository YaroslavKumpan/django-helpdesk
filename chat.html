<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Чат поддержки (безопасная аутентификация)</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; padding: 0 20px; }
        #messages { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        .message { margin-bottom: 10px; padding: 5px; border-radius: 5px; }
        .own { background-color: #e3f2fd; text-align: right; }
        .other { background-color: #f1f1f1; }
        .system { color: #666; font-style: italic; text-align: center; }
        #typingIndicator { height: 20px; font-style: italic; color: #666; margin-bottom: 5px; }
        input, button { padding: 8px; font-size: 16px; }
        #messageInput { width: 70%; }
        button { width: 25%; cursor: pointer; }
        #status { margin-bottom: 10px; font-weight: bold; }
        #tokenDebug { font-size: 12px; color: #999; margin-top: 10px; word-break: break-all; }
        #loginForm { border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 5px; }
        #loginForm input { width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        #loginError { color: red; margin-top: 10px; }
        #chatContainer { display: none; }
        #logoutBtn { padding: 4px 8px; font-size: 14px; width: auto; }
    </style>
</head>
<body>
    <h2>Чат поддержки</h2>

    <!-- Форма логина (изначально видна) -->
    <div id="loginForm">
        <h3>Вход в чат</h3>
        <input type="text" id="loginUsername" placeholder="Имя пользователя" autocomplete="off">
        <input type="password" id="loginPassword" placeholder="Пароль">
        <button id="loginBtn">Войти</button>
        <div id="loginError"></div>
    </div>

    <!-- Контейнер чата (скрыт до успешного входа) -->
    <div id="chatContainer">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>Заявка #<span id="roomIdSpan">?</span></div>
            <button id="logoutBtn">Выйти</button>
        </div>
        <div id="status">🔴 Отключено</div>
        <div id="messages"></div>
        <div id="typingIndicator"></div>
        <input type="text" id="messageInput" placeholder="Введите сообщение..." disabled>
        <button id="sendBtn" disabled>Отправить</button>
        <div id="tokenDebug"></div>
    </div>

    <script>
        // Элементы DOM
        const loginForm = document.getElementById('loginForm');
        const loginUsername = document.getElementById('loginUsername');
        const loginPassword = document.getElementById('loginPassword');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const chatContainer = document.getElementById('chatContainer');
        const logoutBtn = document.getElementById('logoutBtn');
        const statusEl = document.getElementById('status');
        const messagesEl = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const roomIdSpan = document.getElementById('roomIdSpan');
        const typingIndicator = document.getElementById('typingIndicator');
        const tokenDebug = document.getElementById('tokenDebug');

        // Константы
        const ROOM_ID = 18; // ID заявки

        // Состояние
        let accessToken = null;
        let currentUserId = null;
        let socket = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECT_ATTEMPTS = 5;
        let typingTimer;
        const TYPING_TIMEOUT = 1000;

        // ===== Утилиты =====
        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                return null;
            }
        }

        // ===== Логин =====
        async function login(username, password) {
            try {
                const response = await fetch('http://127.0.0.1:8000/api/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include'
                });
                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.detail || 'Ошибка входа');
                }
                const data = await response.json();
                accessToken = data.access;
                currentUserId = parseJwt(accessToken).user_id;
                return true;
            } catch (error) {
                console.error('Login error:', error);
                return false;
            }
        }

        loginBtn.addEventListener('click', async () => {
            const username = loginUsername.value.trim();
            const password = loginPassword.value;
            if (!username || !password) {
                loginError.textContent = 'Заполните оба поля';
                return;
            }
            const success = await login(username, password);
            if (success) {
                loginForm.style.display = 'none';
                chatContainer.style.display = 'block';
                roomIdSpan.textContent = ROOM_ID;
                await loadMessageHistory(ROOM_ID, accessToken);
                createWebSocket();
                startTokenRefreshTimer();
            } else {
                loginError.textContent = 'Неверные данные или ошибка сервера';
            }
        });

        // ===== Загрузка истории =====
        async function loadMessageHistory(requestId, token) {
            try {
                const response = await fetch(`http://127.0.0.1:8000/api/requests/${requestId}/messages/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) throw new Error('Ошибка загрузки истории');
                const messages = await response.json();
                messages.reverse().forEach(msg => {
                    const isOwn = msg.sender.id === currentUserId;
                    addMessage(msg, isOwn);
                });
            } catch (error) {
                console.error('Не удалось загрузить историю:', error);
                addSystemMessage('⚠️ Не удалось загрузить историю сообщений');
            }
        }

        // ===== WebSocket =====
        function createWebSocket() {
            if (!accessToken) {
                console.error('Нет access токена');
                return;
            }
            if (socket) {
                socket.close();
            }
            const wsUrl = `ws://127.0.0.1:8000/ws/chat/${ROOM_ID}/?token=${accessToken}`;
            socket = new WebSocket(wsUrl);

            socket.onopen = () => {
                statusEl.textContent = '🟢 Подключено';
                messageInput.disabled = false;
                sendBtn.disabled = false;
                addSystemMessage('Соединение установлено');
                reconnectAttempts = 0;
            };

            socket.onclose = (e) => {
                statusEl.textContent = '🔴 Отключено';
                messageInput.disabled = true;
                sendBtn.disabled = true;
                if (reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
                    reconnectAttempts++;
                    addSystemMessage(`Попытка переподключения (${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS})...`);
                    setTimeout(async () => {
                        const newToken = await refreshAccessToken();
                        if (newToken) {
                            createWebSocket();
                        } else {
                            addSystemMessage('Не удалось обновить токен. Перезагрузите страницу или войдите заново.');
                        }
                    }, 2000 * reconnectAttempts);
                } else {
                    addSystemMessage('Не удалось восстановить соединение. Перезагрузите страницу или войдите заново.');
                }
            };

            socket.onerror = (e) => {
                console.error('WebSocket ошибка:', e);
            };

            socket.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'typing') {
                    if (data.status === 'start') {
                        typingIndicator.textContent = `${data.user} печатает...`;
                    } else {
                        typingIndicator.textContent = '';
                    }
                } else {
                    addMessage(data, false);
                }
            };
        }

        // ===== Обновление токена =====
        async function refreshAccessToken() {
            try {
                const response = await fetch('http://127.0.0.1:8000/api/token/refresh/', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                if (!response.ok) {
                    throw new Error('Ошибка обновления токена');
                }
                const data = await response.json();
                accessToken = data.access;
                tokenDebug.innerHTML = `Токен обновлён: истекает ${new Date(parseJwt(accessToken).exp * 1000).toLocaleTimeString()}`;
                return accessToken;
            } catch (error) {
                console.error('Не удалось обновить токен:', error);
                addSystemMessage('⚠️ Ошибка аутентификации. Возможно, потребуется войти заново.');
                return null;
            }
        }

        function startTokenRefreshTimer() {
            const payload = parseJwt(accessToken);
            if (payload && payload.exp) {
                const expiresIn = payload.exp * 1000 - Date.now();
                const refreshTime = expiresIn - 60000;
                if (refreshTime > 0) {
                    setTimeout(async () => {
                        console.log('Обновляем токен по таймеру');
                        const newToken = await refreshAccessToken();
                        if (newToken) {
                            createWebSocket();
                        }
                    }, refreshTime);
                }
            }
        }

        // ===== Добавление сообщений =====
        function addMessage(data, isOwn = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + (isOwn ? 'own' : 'other');
            const messageText = data.text || data.message;
            const userName = data.sender ? data.sender.username : data.user;
            const timestamp = data.created_at || data.timestamp;
            msgDiv.innerHTML = `<strong>${userName || 'Неизвестно'}:</strong> ${messageText} <small style="float:right; color:#999;">${new Date(timestamp).toLocaleTimeString()}</small>`;
            messagesEl.appendChild(msgDiv);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function addSystemMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'system';
            msgDiv.textContent = text;
            messagesEl.appendChild(msgDiv);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function sendTyping(status) {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({type: 'typing', status: status}));
            }
        }

        // ===== Обработчики ввода =====
        messageInput.addEventListener('input', () => {
            if (typingTimer) clearTimeout(typingTimer);
            if (!typingTimer) {
                sendTyping('start');
            }
            typingTimer = setTimeout(() => {
                sendTyping('stop');
                typingTimer = null;
            }, TYPING_TIMEOUT);
        });

        sendBtn.addEventListener('click', () => {
            if (typingTimer) {
                clearTimeout(typingTimer);
                typingTimer = null;
                sendTyping('stop');
            }
            const text = messageInput.value.trim();
            if (text && socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({message: text}));
                addMessage({user: 'Я', message: text, timestamp: new Date().toISOString()}, true);
                messageInput.value = '';
            }
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendBtn.click();
            }
        });

        // ===== Выход =====
        logoutBtn.addEventListener('click', async () => {
            try {
                const response = await fetch('http://127.0.0.1:8000/api/logout/', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include'
                });
                if (!response.ok) {
                    throw new Error('Ошибка выхода');
                }
                // Сброс состояния
                accessToken = null;
                currentUserId = null;
                if (socket) {
                    socket.close();
                }
                messagesEl.innerHTML = '';
                chatContainer.style.display = 'none';
                loginForm.style.display = 'block';
                loginError.textContent = '';
                loginUsername.value = '';
                loginPassword.value = '';
            } catch (error) {
                console.error('Logout error:', error);
                addSystemMessage('⚠️ Не удалось выполнить выход');
            }
        });
    </script>
</body>
</html>
