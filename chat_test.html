<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Чат поддержки</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; padding: 0 20px; }
        #messages { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        .message { margin-bottom: 10px; padding: 5px; border-radius: 5px; }
        .own { background-color: #e3f2fd; text-align: right; }
        .other { background-color: #f1f1f1; }
        .system { color: #666; font-style: italic; text-align: center; }
        input, button { padding: 8px; font-size: 16px; }
        #messageInput { width: 70%; }
        button { width: 25%; cursor: pointer; }
        #status { margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Чат поддержки (заявка #<span id="roomIdSpan">?</span>)</h2>
    <div id="status">🔴 Отключено</div>
    <div id="messages"></div>
    <input type="text" id="messageInput" placeholder="Введите сообщение..." disabled>
    <button id="sendBtn" disabled>Отправить</button>

    <script>
        // Элементы DOM
const statusEl = document.getElementById('status');
const messagesEl = document.getElementById('messages');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const roomIdSpan = document.getElementById('roomIdSpan');

// Данные для подключения (временно захардкодим)
const token = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ0b2tlbl90eXBlIjoiYWNjZXNzIiwiZXhwIjoxNzczMDc3MDY5LCJpYXQiOjE3NzMwNzY3NjksImp0aSI6ImVkOGZmOGYzYmI2MjRlY2ZiMWY2NTgwOGRmNDAyY2FkIiwidXNlcl9pZCI6IjIifQ.fWhPSMlUhsh9942f-Q_yCHMRT4TahyqUdjxS0WF8d9k';
const roomId = 18; // ID заявки, к которой есть доступ

roomIdSpan.textContent = roomId;

// Создаём WebSocket-соединение
const socket = new WebSocket(`ws://127.0.0.1:8000/ws/chat/${roomId}/?token=${token}`);

// Функция для добавления сообщения в окно чата
function addMessage(data, isOwn = false) {
    const msgDiv = document.createElement('div');
    msgDiv.className = 'message ' + (isOwn ? 'own' : 'other');
    // data - это объект {message, user, timestamp}
    msgDiv.innerHTML = `<strong>${data.user}:</strong> ${data.message} <small style="float:right; color:#999;">${new Date(data.timestamp).toLocaleTimeString()}</small>`;
    messagesEl.appendChild(msgDiv);
    // Прокручиваем вниз
    messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addSystemMessage(text) {
    const msgDiv = document.createElement('div');
    msgDiv.className = 'system';
    msgDiv.textContent = text;
    messagesEl.appendChild(msgDiv);
}

// Обработчики событий WebSocket
socket.onopen = () => {
    statusEl.textContent = '🟢 Подключено';
    messageInput.disabled = false;
    sendBtn.disabled = false;
    addSystemMessage('Соединение установлено');
};

socket.onclose = (e) => {
    statusEl.textContent = '🔴 Отключено';
    messageInput.disabled = true;
    sendBtn.disabled = true;
    addSystemMessage('Соединение закрыто');
};

socket.onerror = (e) => {
    console.error('WebSocket ошибка:', e);
    addSystemMessage('⚠️ Ошибка соединения');
};

socket.onmessage = (e) => {
    const data = JSON.parse(e.data);
    // Определяем, своё ли сообщение (можно по user, но пока все чужие)
    addMessage(data, false); // для простоты все сообщения считаем чужими
};

// Отправка сообщения по кнопке
sendBtn.addEventListener('click', () => {
    const text = messageInput.value.trim();
    if (text) {
        socket.send(JSON.stringify({message: text}));
        // Добавляем сообщение как своё (для отображения)
        addMessage({user: 'Я', message: text, timestamp: new Date().toISOString()}, true);
        messageInput.value = '';
    }
});

// Отправка по Enter
messageInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        sendBtn.click();
    }
});
    </script>
</body>
</html>
